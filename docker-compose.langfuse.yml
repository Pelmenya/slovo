# =============================================================================
# Langfuse — LLM Observability (self-hosted)
# =============================================================================
# Запуск:  docker compose -f docker-compose.langfuse.yml up -d
# UI:      http://localhost:3100
#
# Langfuse нужна отдельная Postgres — не смешиваем с основной БД slovo.
# Первый запуск — создать аккаунт через UI → получить API keys → внести в .env

services:
    langfuse-postgres:
        image: postgres:18-alpine
        container_name: slovo-langfuse-postgres
        restart: unless-stopped
        ports:
            - "127.0.0.1:${LANGFUSE_POSTGRES_PORT:-5434}:5432"
        environment:
            POSTGRES_USER: ${LANGFUSE_POSTGRES_USER}
            POSTGRES_PASSWORD: ${LANGFUSE_POSTGRES_PASSWORD}
            POSTGRES_DB: ${LANGFUSE_POSTGRES_DB}
        volumes:
            - langfuse_postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${LANGFUSE_POSTGRES_USER} -d ${LANGFUSE_POSTGRES_DB}"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - slovo-network

    langfuse:
        image: langfuse/langfuse:3.169.0
        container_name: slovo-langfuse
        restart: unless-stopped
        depends_on:
            langfuse-postgres:
                condition: service_healthy
        ports:
            - "127.0.0.1:${LANGFUSE_PORT:-3100}:3000"
        environment:
            DATABASE_URL: postgresql://${LANGFUSE_POSTGRES_USER}:${LANGFUSE_POSTGRES_PASSWORD}@langfuse-postgres:5432/${LANGFUSE_POSTGRES_DB}
            NEXTAUTH_URL: http://localhost:${LANGFUSE_PORT:-3100}
            NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
            SALT: ${LANGFUSE_SALT}
            ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
            TELEMETRY_ENABLED: "false"
            LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
        networks:
            - slovo-network

volumes:
    langfuse_postgres_data:

networks:
    slovo-network:
        external: true
        name: slovo-network
