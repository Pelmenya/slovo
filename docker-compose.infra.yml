# =============================================================================
# Core infrastructure — базы, очереди, оркестратор
# =============================================================================
# Запуск:  docker compose -f docker-compose.infra.yml up -d
# Стоп:    docker compose -f docker-compose.infra.yml down
# С данными: docker compose -f docker-compose.infra.yml down -v  (сносит volumes)

services:
    postgres:
        image: pgvector/pgvector:0.8.2-pg18-trixie
        container_name: slovo-postgres
        restart: unless-stopped
        ports:
            - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        volumes:
            # PG18 breaking: монтируем в /var/lib/postgresql (не .../data),
            # образ сам кладёт данные в подпапку с major-version. См.
            # https://github.com/docker-library/postgres/pull/1259
            - postgres_data:/var/lib/postgresql
            # init-скриптов нет: все extensions создаются миграциями Prisma
            # (schema/main.prisma -> extensions=[vector, pg_trgm, uuid-ossp, pgcrypto])
            # — единственный источник истины.
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - slovo-network

    valkey:
        image: valkey/valkey:9-alpine
        container_name: slovo-valkey
        restart: unless-stopped
        ports:
            - "127.0.0.1:${REDIS_PORT:-6380}:6379"
        command: valkey-server --appendonly yes
        volumes:
            - valkey_data:/data
        healthcheck:
            test: ["CMD", "valkey-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - slovo-network

    rabbitmq:
        image: rabbitmq:4.2.5-management-alpine
        container_name: slovo-rabbitmq
        restart: unless-stopped
        ports:
            - "127.0.0.1:${RABBITMQ_PORT:-5672}:5672"
            - "127.0.0.1:${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
        environment:
            RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
            RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
        volumes:
            - rabbitmq_data:/var/lib/rabbitmq
        healthcheck:
            test: ["CMD", "rabbitmq-diagnostics", "ping"]
            interval: 30s
            timeout: 10s
            retries: 5
        networks:
            - slovo-network

    minio:
        # Community-релизы MinIO на Docker Hub заморожены на 2025-09-07 (с октября 2025
        # MinIO перенесли hotfix-pipeline на quay.io/minio/minio и в release notes пишут
        # «clone the source and build the container»). В release 2025-10-15 — CVE на
        # Privilege Escalation via Session Policy Bypass в STS/service accounts.
        # Для slovo это не проблема: dev-only на 127.0.0.1, один root user, STS не используем.
        # В проде MinIO вообще уйдёт — там AWS S3 или managed S3-совместимый.
        #
        # Образ pin'нется по digest manifest-list (multi-arch): даже если MinIO удалят
        # тег с Docker Hub, digest однозначно резолвится по любому mirror / локальному
        # кэшу. Комментарий с тегом оставлен для читаемости.
        # Обновлять digest: curl https://hub.docker.com/v2/repositories/minio/minio/tags/<TAG>
        image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e  # RELEASE.2025-09-07T16-13-09Z
        container_name: slovo-minio
        restart: unless-stopped
        ports:
            # S3 API и console — на 127.0.0.1, наружу не торчат.
            # Порты 9010/9011 (не 9000/9001) — чтобы не конфликтовать с чужими
            # локальными MinIO других проектов.
            - "127.0.0.1:${MINIO_PORT:-9010}:9000"
            - "127.0.0.1:${MINIO_CONSOLE_PORT:-9011}:9001"
        environment:
            MINIO_ROOT_USER: ${MINIO_ROOT_USER}
            MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
        command: server /data --console-address ":9001"
        volumes:
            - minio_data:/data
        healthcheck:
            # /minio/health/live — liveness, /ready — readiness. live достаточно.
            test: ["CMD-SHELL", "mc ready local || curl -sf http://localhost:9000/minio/health/live"]
            interval: 15s
            timeout: 5s
            retries: 5
        networks:
            - slovo-network

    flowise:
        image: flowiseai/flowise:3.1.2
        container_name: slovo-flowise
        restart: unless-stopped
        ports:
            - "127.0.0.1:${FLOWISE_PORT:-3130}:3000"
        environment:
            # Прокидываем системный HTTP-прокси хоста (10810) в контейнер,
            # чтобы outbound-запросы к Anthropic/OpenAI/Groq шли через VPN.
            # Docker на Windows/Mac резолвит host.docker.internal в IP хоста.
            HTTP_PROXY: ${HOST_HTTP_PROXY:-http://host.docker.internal:10810}
            HTTPS_PROXY: ${HOST_HTTP_PROXY:-http://host.docker.internal:10810}
            NO_PROXY: localhost,127.0.0.1,slovo-postgres,slovo-valkey,slovo-rabbitmq,slovo-flowise,slovo-langfuse,slovo-langfuse-postgres,slovo-minio,postgres,valkey,rabbitmq,langfuse,langfuse-postgres,flowise,minio
            # Node.js fetch (undici) не читает HTTP_PROXY автоматически —
            # preload-скрипт monkey-patch'ит глобальный dispatcher на ProxyAgent.
            NODE_OPTIONS: --require /scripts/flowise-proxy-bootstrap.cjs
            # Отключаем кеш скомпилированного chatflow — иначе overrideConfig.promptValues
            # может не срабатывать (из GitHub issue FlowiseAI/Flowise#2991 от maintainer HenryHengZJ).
            DISABLE_CHATFLOW_REUSE: "true"
        extra_hosts:
            # Для Linux host.docker.internal не работает из коробки;
            # на Windows/Mac Docker Desktop резолвит сам, эта строка игнорируется.
            - "host.docker.internal:host-gateway"
        volumes:
            - flowise_data:/root/.flowise
            - ./docker/flowise-proxy-bootstrap.cjs:/scripts/flowise-proxy-bootstrap.cjs:ro
        networks:
            - slovo-network

volumes:
    postgres_data:
    valkey_data:
    rabbitmq_data:
    flowise_data:
    minio_data:

networks:
    slovo-network:
        driver: bridge
        name: slovo-network
